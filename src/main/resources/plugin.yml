name: SMP
version: '1.0'
main: de.ben.smp
api-version: '1.21'

commands:
  admin:
    description: Oeffnet das Admin-Menue
    usage: /admin
    permission: fog.admin

  opennether:
    description: Nether oeffnen oder schliessen
    permission: fog.admin.nether

  end:
    description: End oeffnen oder schliessen
    permission: fog.admin.end

  vanish:
    description: Schaltet Vanish an oder aus
    usage: /vanish
    permission: fog.vanish

  help:
    description: Gibt das Willkommens-Buch
    usage: /help

  tpa:
    description: Teleportiert dich zu einem Spieler nach Zustimmung
    usage: /tpa <Spieler>

  tpahere:
    description: Laesst einen Spieler zu dir teleportieren nach Zustimmung
    usage: /tpahere <Spieler>

  tpaccept:
    description: Akzeptiert eine Teleport-Anfrage
    usage: /tpaccept

  tpdeny:
    description: Lehnt eine Teleport-Anfrage ab
    usage: /tpdeny

  rockets:
    description: Rockets ein oder aus
    usage: /rockets
    permission: fog.admin.rockets

permissions:
  # --------------------- ADMIN MENU ----------------------
  fog.admin:
    description: Zugriff auf das Admin-Menue mit /admin
    default: op

  fog.admin.item:
    description: Erhaelt das Admin-Item beim Join
    default: op

  fog.admin.tpr:
    description: Zufalls-Teleport zu einem anderen Spieler
    default: op

  fog.admin.players:
    description: Zugriff auf die Spieler-Liste im Admin-Menue
    default: op

  fog.admin.players.tpt:
    description: Erlaubt Teleport zu einem bestimmten Spieler im Admin-Menue
    default: op

  fog.admin.players.god:
    description: Darf God Mode im Admin-Menue aktivieren
    default: op

  # --------------------- VANISH ----------------------
  fog.vanish:
    description: Erlaubt den /vanish Befehl
    default: op

  fog.vanish.item:
    description: Zeigt die Vanish-Feder im Admin-Menue
    default: op

  # --------------------- SPECTATOR ----------------------
  fog.spectator:
    description: Erlaubt den Spectator-Toggle im Admin-Menue
    default: op

  fog.spectator.item:
    description: Zeigt den Spectator-Button ueber der Feder im Admin-Menue
    default: op

  # --------------------- TPA SYSTEM ----------------------
  fog.tpa.cooldown:
    description: Reduziert den TPA-Cooldown auf 90 Sekunden
    default: op

  # --------------------- ROCKETS ----------------------
  fog.admin.rockets:
    description: Darf Rockets toggeln
    default: op

  # --------------------- END TOGGLE ----------------------
  fog.admin.end:
    description: Darf das End oeffnen oder schliessen
    default: op

  fog.admin.nether:
    description: Darf den Nether oeffnen oder schliessen
    default: op
